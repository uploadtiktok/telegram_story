name: Telegram Story Bot

on:
  schedule:
    # سيتم التشغيل آلياً كل يوم في الساعة 00:00 بتوقيت جرينتش
    - cron: '0 0 * * *'
  workflow_dispatch: # يسمح لك بتشغيل البوت يدوياً في أي وقت

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # تحديث لآخر نسخة من الأكشن

      - name: Set up Python
        uses: actions/setup-python@v5 # تحديث لآخر نسخة من الأكشن
        with:
          python-version: '3.11' # استخدام نسخة حديثة لحل مشاكل التوافق

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client isodate yt-dlp telethon requests

      - name: Run Python Script
        env:
          # ربط جميع الأسرار (Secrets) الموجودة في إعدادات ريبو جيت هاب
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          COOKIES_TEXT: ${{ secrets.COOKIES_TEXT }} # السكرت النصي للكوكيز
        run: |
          # تشغيل الملف الأساسي
          python main.py
