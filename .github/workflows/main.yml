name: Telegram Story Bot

on:
  schedule:
    # التشغيل تلقائياً كل يوم الساعة 12 منتصف الليل بتوقيت جرينتش
    - cron: '0 0 * * *'
  workflow_dispatch: # يتيح لك التشغيل اليدوي من قسم Actions في GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client isodate yt-dlp telethon requests

      - name: Run Python Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          COOKIES_B64: ${{ secrets.COOKIES_B64 }}
        run: |
          python main.py
